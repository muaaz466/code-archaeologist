services:
  - type: web
    name: code-archaeologist-api
    runtime: python
    repo: https://github.com/muaaz466/code-archaeologist
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 8000
    plan: free
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: code-archaeologist-web
    runtime: node
    repo: https://github.com/muaaz466/code-archaeologist
    branch: master
    buildCommand: cd frontend/web && npm install && npm run build
    startCommand: cd frontend/web && npx serve -s dist -l 3000
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_API_URL
        value: https://code-archaeologist-7qxt.onrender.com
    plan: free
    autoDeploy: true
